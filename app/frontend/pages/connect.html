<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EyeCue - Connect</title>
  <link rel="icon" type="image/png" href="../assets/eyecue-logo.png">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <div class="container">
    <div class="page-title">
      <img src="../assets/eyecue-logo.png" alt="EyeCue logo" class="brand-logo">
    </div>

    <div id="connectScreen">
      <form id="connectForm">
        <div class="form-group">
          <label for="networkName">Network Name</label>
          <input type="text" id="networkName" name="networkName" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="networkPassword">Network Password</label>
          <input type="password" id="networkPassword" name="networkPassword" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="serialPort">Serial Port</label>
          <select id="serialPort" name="serialPort">
            <option value="">Loading ports...</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" id="connectButton" class="btn btn-primary">Connect Device</button>
          <button type="button" id="bypassButton" class="btn btn-secondary">Bypass Connect</button>
        </div>
        <p class="help-text">Bypass mode skips serial pairing and continues to runtime.</p>
      </form>
    </div>

    <div id="runtimeScreen" class="screen-hidden">
      <div class="toggle-row">
        <label for="trackingToggle">Enable Cursor Tracking</label>
        <input type="checkbox" id="trackingToggle">
      </div>

      <div class="status-panel">
        <div class="status-row" id="phaseText">Phase: idle</div>
        <div class="status-row" id="bypassText">Bypass Mode: off</div>
        <div class="status-row" id="framesText">Frames Processed: 0</div>
        <div class="status-log" id="statusLog"></div>
      </div>

      <div class="runtime-actions">
        <button type="button" id="backButton" class="btn btn-secondary">Back</button>
        <button type="button" id="stopButton" class="btn btn-primary">Stop Runtime</button>
      </div>
    </div>
  </div>

  <script src="../scripts/api-client.js"></script>
  <script src="../scripts/connect.js"></script>
</body>
</html>
